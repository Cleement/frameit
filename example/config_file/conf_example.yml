# -----------------------------------------------------------------
# ##### FRAMEIT Configuration File #####
# ---------------------------------------
# FrameIt example configuration file — replace all placeholder values before running.
# This file controls the simulation details, tracking method, subdomain extraction, variable selection, and output paths.
# For a full description of all parameters, refer to the documentation.

simulation_name: "SIMU_NAME"

# File name has to be written as  : file_name_prefix+file_name+’???’+file_name_suffix+file_type 
# where the "???" stands for a number that represents the time step with the form 001... 999.
file_name_prefix: ""
file_name: ""
file_name_suffix: ""
file_type: ""                 # grib of nc (netcdf)

# Simulation details
# ------------------
atm_model: "YOUR_ATM_MODEL"   # AROME or MNH
ocean_model: "YOUR_OCE_MODEL" # Not mandatory
wave_model: "YOUR_WAV_MODEL"  # Not mandatory
resolution: XXXX              # in meter
comment: "ANY COMMENT"

# Debug flag
# ----------
DEBUG: true

# Tracking option
# ---------------
tracking_method: "CHOOSE_A_METHOD" # wind_pressure, fixed_box, prescribed_track, utrack
# Prescribed track 
prescribed_track_file: "PATH/TO/NC/FILE"  # Only if tracking_method: " prescribed_track"

# Utrack parameter (only if tracking_method: "utrack", check documentation)
utrack_weights_file: "/path/to/model_latest.ckpt"
utrack_use_gpu: false
utrack_batch_size: 16

# Subdomain definition
# --------------------
fix_subdomain_center: [0,0]   # Only if tracking_method: "fixed_box"
# Box subdomain size (km) :  
x_boxsize_km: XXX
y_boxsize_km: XXX

# Variables selection 
# -------------------
requested_variables_user: 
  heightAboveGround:                    # level type
    variables: ["var0","var1","var3"]
    level_selection: "indices"          # "values" "indices"; "all"
    level_values: []                    # if level_selection = "values" 
    level_indices: [0,1,2,3,4,5]        # if level_selection = "indices"
    
  level:                                # level type
    variables: ["var4","var5","var6"]
    level_selection: "indices"          # "values" "indices"; "all"
    level_values: []                    # if level_selection = "values" 
    level_indices: [0,1,2,3,4,5]        # if level_selection = "indices"

  isobaricInhPa:                        # level type
    variables: ["var7","var8","var9"]
    level_selection: "values"           # ou "values" "indices"; "all"
    level_values: [1000,850,400]        # if level_selection = "values" 
    level_indices: []                   # if level_selection = "indices"
        
  surface:                                          # level type
    variables: ["surfvar0","surfvar1","surfvar2","surfvar3","surfvar4"]

# Path for inputs and outputs
simulation_output_dir: "PATH/TO/SIMULATION/FILES"
frameit_output_dir: "PATH/FOR/FRAMEIT/OUTPUTS"

# Polar projection parameter
# --------------------------
compute_polar_proj: true
# Resolution
radial_resolution: XXXX        # in meters
azimuthal_resolution: X         # in degrees

# Variables (all level are selected in the projection)
polar_variables:
  heightAboveGround:
    variables: ["var0","var3"]
  level:
    variables: ["var4","var5"]
  isobaricInhPa:
    variables: ["var9"]
  surface:
    variables: ["surfvar0","surfvar1"]

field_orientation: "geodesic"
# Use to add other parameters online from the simulation (left empty)
simulation_parameter: {}